<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="task_manager_style.css">
	<title>Task Manager</title>
</head>
<body>
<div id="taskManager" class="taskManager">
<input class="task" id="task0">
<div class="timerInfo">
	<h1 id="hours">00</h1>
	<h1 id="minutes">00</h1>
	<h1 id="seconds">00</h1>
	<h1 id="secTenth">00</h1>
</div>
<div class="buttonContainer">
    <button id="start" class="startBtn">Start</button>
    <button id="pause" class="pauseBtn">Pause</button>
    <button id="stop" class="stopBtn">Stop</button>
    <button class="submitBtn">Submit</button>
</div>
</div>
<button id="newTaskBtn">+</button>
	</body>
	<script src="task_manager.js"></script>
	<script src="easytimer.js"></script>
</html>
